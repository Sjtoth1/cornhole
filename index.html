// ── Score Validation ──
function valScore(s1,s2){
  const hi=Math.max(s1,s2),lo=Math.min(s1,s2);
  if(s1===s2)return{ok:false,msg:"Can't be tied"};
  if(hi<21)return{ok:false,msg:"Winner must reach 21+"};
  if(s1<0||s2<0)return{ok:false,msg:"Can't be negative"};
  let w=null;
  if(lo>20)w=`Loser has ${lo}. Usually max 20. Correct?`;
  else if(hi>30)w="Scores seem high. Double-check?";
  return{ok:true,warn:w};
}

// ── Bracket Engine ──
function genBracket(teams){
  const n=teams.length;if(n<2)return null;
  const p=np2(n),R=Math.log2(p),sd2=genSeed(n),ms=[],mm={};
  const mk=(b,r,i)=>`${b}-${r}-${i}`;
  for(let r=1;r<=R;r++)for(let i=0;i<p/Math.pow(2,r);i++){
    const m={id:uid(),bracket:"W",round:r,index:i,t1:null,t2:null,s1:null,s2:null,status:"pending",board:null,winnerId:null,loserId:null};
    if(r===1){const[a,b]=sd2[i];m.t1=a<=n?teams[a-1].id:null;m.t2=b<=n?teams[b-1].id:null;
      if(m.t1&&!m.t2){m.status="done";m.winnerId=m.t1}else if(!m.t1&&m.t2){m.status="done";m.winnerId=m.t2}else if(!m.t1&&!m.t2)m.status="done"}
    mm[mk("W",r,i)]=m;ms.push(m)}
  const lR=Math.max(0,2*(R-1));
  for(let lr=1;lr<=lR;lr++){const k=Math.ceil(lr/2);for(let i=0;i<p/Math.pow(2,k+1);i++){
    const m={id:uid(),bracket:"L",round:lr,index:i,t1:null,t2:null,s1:null,s2:null,status:"pending",board:null,winnerId:null,loserId:null};
    mm[mk("L",lr,i)]=m;ms.push(m)}}
  const gf={id:uid(),bracket:"GF",round:1,index:0,t1:null,t2:null,s1:null,s2:null,status:"pending",board:null,winnerId:null,loserId:null};
  const gfr={id:uid(),bracket:"GFR",round:1,index:0,t1:null,t2:null,s1:null,s2:null,status:"pending",board:null,winnerId:null,loserId:null};
  ms.push(gf,gfr);prop(ms,mm,p,R,lR,gf.id,gfr.id);
  return{matches:ms,mm,p,R,lbR:lR,gfId:gf.id,gfrId:gfr.id};
}
function genSeed(n){const p=np2(n);let b=[1,2];for(let r=1;r<Math.log2(p);r++){const s=Math.pow(2,r+1)+1,nb=[];for(const x of b)nb.push(x,s-x);b=nb}const pr=[];for(let i=0;i<b.length;i+=2)pr.push([b[i],b[i+1]]);return pr}

function prop(ms,mm,p,R,lR,gfId,gfrId){
  const mk=(b,r,i)=>`${b}-${r}-${i}`,gf=ms.find(m=>m.id===gfId),gfr=ms.find(m=>m.id===gfrId);
  // WB forward
  for(let r=1;r<R;r++)for(let i=0;i<p/Math.pow(2,r);i++){const m=mm[mk("W",r,i)];if(m?.status==="done"&&m.winnerId){const nx=mm[mk("W",r+1,~~(i/2))];if(nx){i%2===0?nx.t1=m.winnerId:nx.t2=m.winnerId}}}
  const wf=mm[mk("W",R,0)];if(wf?.status==="done"&&wf.winnerId)gf.t1=wf.winnerId;
  // WR1 losers->LR1
  for(let i=0;i<p/2;i++){const m=mm[mk("W",1,i)];if(m?.status==="done"&&m.loserId){const lb=mm[mk("L",1,~~(i/2))];if(lb){i%2===0?lb.t1=m.loserId:lb.t2=m.loserId}}}
  // WR drop
  for(let r=2;r<=R;r++){const lr=2*(r-1);for(let i=0;i<p/Math.pow(2,r);i++){const wm=mm[mk("W",r,i)];if(wm?.status==="done"&&wm.loserId){const lm=mm[mk("L",lr,i)];if(lm)lm.t2=wm.loserId}}}
  // LB internal
  for(let lr=1;lr<=lR;lr++){const k=Math.ceil(lr/2);for(let i=0;i<p/Math.pow(2,k+1);i++){const m=mm[mk("L",lr,i)];if(!m)continue;
    if(m.t1&&m.t2&&m.status==="pending")m.status="ready";
    if(m.status==="done"&&m.winnerId){if(lr<lR){if(lr%2===1){const nx=mm[mk("L",lr+1,i)];if(nx)nx.t1=m.winnerId}else{const nx=mm[mk("L",lr+1,~~(i/2))];if(nx){i%2===0?nx.t1=m.winnerId:nx.t2=m.winnerId}}}else gf.t2=m.winnerId}}}
  // Bye advance
  let ch=true,g=0;
  while(ch&&g++<50){ch=false;for(const m of ms){if(m.status==="done"||m.bracket==="GF"||m.bracket==="GFR")continue;
    if(!((m.t1&&!m.t2)||(!m.t1&&m.t2)))continue;let res=false;
    if(m.bracket==="W"&&m.round>1){const f1=mm[mk("W",m.round-1,m.index*2)],f2=mm[mk("W",m.round-1,m.index*2+1)];res=f1?.status==="done"&&f2?.status==="done"}
    else if(m.bracket==="L"){if(m.round===1){const f1=mm[mk("W",1,m.index*2)],f2=mm[mk("W",1,m.index*2+1)];res=f1?.status==="done"&&f2?.status==="done"}
      else if(m.round%2===0){const lf=mm[mk("L",m.round-1,m.index)],wr=m.round/2+1,wf2=mm[mk("W",wr,m.index)];res=lf?.status==="done"&&wf2?.status==="done"}
      else{const f1=mm[mk("L",m.round-1,m.index*2)],f2=mm[mk("L",m.round-1,m.index*2+1)];res=f1?.status==="done"&&f2?.status==="done"}}
    if(res){m.status="done";m.winnerId=m.t1||m.t2;m.loserId=null;ch=true;
      if(m.bracket==="W"){if(m.round<R){const nx=mm[mk("W",m.round+1,~~(m.index/2))];if(nx){m.index%2===0?nx.t1=m.winnerId:nx.t2=m.winnerId}}else gf.t1=m.winnerId}
      else if(m.bracket==="L"){if(m.round<lR){if(m.round%2===1){const nx=mm[mk("L",m.round+1,m.index)];if(nx)nx.t1=m.winnerId}else{const nx=mm[mk("L",m.round+1,~~(m.index/2))];if(nx){m.index%2===0?nx.t1=m.winnerId:nx.t2=m.winnerId}}}else gf.t2=m.winnerId}}}}
  // Readiness
  for(const m of ms){if(m.status==="pending"&&m.t1&&m.t2)m.status="ready"}
  if(gf.t1&&gf.t2&&gf.status==="pending")gf.status="ready";
  if(gf.status==="done"&&gf.winnerId===gf.t2){gfr.t1=gf.t1;gfr.t2=gf.t2;if(gfr.status==="pending")gfr.status="ready"}
}
function rebMM(b){if(!b?.matches)return b;const mm={};b.matches.forEach(m=>{if(m.bracket==="W"||m.bracket==="L")mm[`${m.bracket}-${m.round}-${m.index}`]=m});return{...b,mm}}

// ── Cascade Invalidate ──
function cascade(ms,changed){
  // Track invalidated team IDs with the chronological order where they were invalidated
  const inv=new Map(); // teamId -> order where invalidated
  const order=m=>{
    if(m.bracket==="GFR")return 10000;if(m.bracket==="GF")return 9000;
    if(m.bracket==="W")return m.round*100;
    if(m.round%2===1)return Math.ceil(m.round/2)*100+50;
    return (m.round/2+1)*100+25;
  };
  const changedOrd=order(changed);
  // Seed with the changed match's teams at its order
  if(changed.winnerId)inv.set(changed.winnerId,changedOrd);
  if(changed.loserId)inv.set(changed.loserId,changedOrd);
  let ch=true,guard=0;
  while(ch&&guard++<100){ch=false;for(const m of ms){if(m.id===changed.id)continue;
    if(m.bracket===changed.bracket&&m.round===changed.round)continue;
    const mOrd=order(m);
    if(m.status==="done"||m.status==="active"||m.status==="ready"){
      // Check if either team is invalidated AND this match is after where they were invalidated
      const a=m.t1&&inv.has(m.t1)&&mOrd>inv.get(m.t1);
      const b2=m.t2&&inv.has(m.t2)&&mOrd>inv.get(m.t2);
      if(a||b2){
        // Add this match's winner/loser at THIS match's order (not the original)
        if(m.winnerId&&!inv.has(m.winnerId))inv.set(m.winnerId,mOrd);
        if(m.loserId&&!inv.has(m.loserId))inv.set(m.loserId,mOrd);
        m.status="pending";m.winnerId=null;m.loserId=null;m.s1=null;m.s2=null;m.board=null;
        if(!(m.bracket==="W"&&m.round===1)){if(a)m.t1=null;if(b2)m.t2=null}ch=true}}}}
  // GF/GFR check
  for(const m of ms){if((m.bracket==="GF"||m.bracket==="GFR")&&m.status!=="pending"&&m.id!==changed.id){
    const mOrd=order(m);
    const a=m.t1&&inv.has(m.t1)&&mOrd>inv.get(m.t1);
    const b2=m.t2&&inv.has(m.t2)&&mOrd>inv.get(m.t2);
    if(a||b2){if(m.winnerId)inv.set(m.winnerId,mOrd);m.status="pending";m.winnerId=null;m.loserId=null;m.s1=null;m.s2=null;m.board=null;if(a)m.t1=null;if(b2)m.t2=null}}}
}

// ── Rules ──
const RULES=`"GAME ON" CORNHOLE RULES\n\nOBJECTIVE: First team to reach or exceed 21 points at the end of an inning.\n\nEQUIPMENT\n• Boards: 2ft × 4ft, hole 9in from top, 6in diameter\n• Bags: 4 per team, contrasting colors, ~1 lb. Must use Cup's bags.\n• Distance: 27 feet apart, front to front\n\nGAMEPLAY\n• Two teams of two players each\n• Pitch underhand from the pitcher's box\n• Players alternate tossing toward opposite board\n• Scoring team goes first next inning\n• Cannot step past front of board\n\nSCORING\n• Through hole: 3 points\n• On board (stays): 1 point\n• Touching ground/bounced: 0 points\n• Cancellation: Only one team scores per inning (difference)\n  Example: Team A=5, Team B=2 → Team A earns 3\n\nWINNING: First to 21+ at end of inning wins!\nDouble elimination tournament. GAME ON!`;

// ── QR Code (MIT licensed, github.com/nickarase/qrcode-generator) ──
var _qrLib=(function(){var qrcode = function() {

        for (var row = 0; row < moduleCount; row += 1) {

          }

          } else {

    };

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {

        }

      }

        for (var j = 0; j < pos.length; j += 1) {

      var bytes = [];

function cleanMsg(text){
  const lower=text.toLowerCase().replace(/[^a-z\s]/g,"");

              <span style={{fontSize:13*sc,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",color}}>{label}</span></div>
            <div style={{overflowX:"auto",paddingBottom:8*sc}}><div style={{position:"relative",width:tW+20,height:tH+10,minWidth:tW+20}}>
              <svg style={{position:"absolute",top:0,left:0,width:tW+20,height:tH+10,pointerEvents:"none"}}>
                {conns.map((c,i)=><line key={i} x1={c.x1} y1={c.y1} x2={c.x2} y2={c.y2} stroke={C.line} strokeWidth={1.5*sc}/>)}</svg>
              {rounds.flat().map(m=>pos[m.id]?smc(m,pos[m.id]):null)}</div></div></div>};
        return <div>
          {sCh&&<div style={{textAlign:"center",padding:`${24*sc}px`,marginBottom:20*sc,background:`linear-gradient(135deg,${C.purpleBg},${C.WBg})`,borderRadius:14,border:`2px solid ${C.purple}`,boxShadow:`0 4px 30px ${C.purpleBg}`}}>
            <div style={{fontSize:11*sc,color:C.purple,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>{"\ud83c\udfc6"} Tournament Champion {"\ud83c\udfc6"}</div>
            <div style={{fontSize:30*sc,fontWeight:900}}>{sCh}</div></div>}
          {sActive>0&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12*sc}}>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12*sc,fontWeight:700,color:C.blue,padding:`4px ${10*sc}px`,background:C.blueBg,borderRadius:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:C.blue,animation:"pulse 1.5s infinite"}}/>{sActive} game{sActive!==1?"s":""} live</span></div>}
          {(()=>{const sDone=sm.filter(m=>m.status==="done").length,sTotal=sm.length,sPct=sTotal?Math.round(sDone/sTotal*100):0;
            return sTotal>0&&specData.phase!=="done"?<div style={{marginBottom:14*sc}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <span style={{fontSize:10*sc,fontWeight:700,color:C.dim,textTransform:"uppercase"}}>Progress</span>
                <span style={{fontSize:11*sc,fontWeight:800,color:C.accent}}>{sPct}% ({sDone}/{sTotal})</span></div>
              <div style={{height:6*sc,background:C.border,borderRadius:3*sc,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${sPct}%`,background:`linear-gradient(90deg,${C.accent},${C.W})`,borderRadius:3*sc,transition:"width 0.5s ease"}}/></div>
            </div>:null})()}
          {(()=>{const queued=sm.filter(m=>m.status==="ready");
            return queued.length>0?<div style={{marginBottom:16*sc,padding:`${10*sc}px`,background:C.bg2,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10*sc,fontWeight:700,color:C.dim,textTransform:"uppercase",marginBottom:8*sc}}>Up Next ({queued.length})</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{queued.slice(0,6).map(m=>{
                const bc=m.bracket==="W"?C.W:m.bracket==="L"?C.L:C.purple;
                return <div key={m.id} style={{padding:`${4*sc}px ${8*sc}px`,borderRadius:6,border:`1px solid ${bc}44`,background:`${bc}08`,fontSize:11*sc}}>
                  <span style={{fontWeight:700,color:bc}}>{m.bracket}R{m.round}</span> <span style={{color:C.text}}>{sn(m.t1)} vs {sn(m.t2)}</span>
                </div>})}{queued.length>6&&<span style={{fontSize:10*sc,color:C.dim,padding:`${4*sc}px`}}>+{queued.length-6} more</span>}</div>
            </div>:null})()}
          {ssec("Winners' Bracket",C.W,swR)}
          {slRs.length>0&&ssec("Losers' Bracket",C.L,slRs)}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8*sc}}><div style={{width:4,height:16*sc,borderRadius:2,background:C.purple}}/>
            <span style={{fontSize:13*sc,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",color:C.purple}}>Grand Final</span></div>
          <div style={{display:"flex",gap:16*sc,flexWrap:"wrap"}}>{sgf&&smc(sgf,null,true)}{sgfr&&(sgfr.status!=="pending"||sgf?.status==="done")&&smc(sgfr,null,true)}</div>
        </div>;
      })():<div style={{padding:32,color:C.dim,fontSize:14*sc,textAlign:"center"}}>No broadcast detected. Organizer needs to enable broadcasting.</div>}
    </div>}

    {/* REGISTRATION */}
    {!spectator&&phase==="reg"&&<div style={{maxWidth:580,margin:"0 auto",padding:16*sc}}>
      {/* SETUP BAR */}
      <div style={{...CD,marginBottom:12*sc,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13*sc,fontWeight:700}}>Lanes</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setBoards(p=>Math.max(1,p-1))} style={{...B("g"),width:30,height:30,padding:0,borderRadius:"50%",justifyContent:"center",fontSize:16,fontWeight:800}}>-</button>
            <span style={{fontSize:20*sc,fontWeight:900,width:32,textAlign:"center",fontVariantNumeric:"tabular-nums"}}>{boards}</span>
            <button onClick={()=>setBoards(p=>Math.min(32,p+1))} style={{...B("g"),width:30,height:30,padding:0,borderRadius:"50%",justifyContent:"center",fontSize:16,fontWeight:800}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11*sc,color:C.dim}}>Auto-assign</span>
          <button onClick={()=>setAutoB(!autoB)} style={{width:40,height:22,borderRadius:11,border:"none",cursor:"pointer",position:"relative",background:autoB?C.accent:C.border,transition:"background 0.2s"}}>
            <div style={{width:16,height:16,borderRadius:"50%",background:"#FFF",position:"absolute",top:3,left:autoB?21:3,transition:"left 0.2s"}}/></button>
        </div>
        <div style={{fontSize:10*sc,color:C.dim}}>{teams.length} team{teams.length!==1?"s":""}{teams.length>=2?` / ${np2(teams.length)-teams.length} bye${np2(teams.length)-teams.length!==1?"s":""}`:""}</div>
      </div>
      {/* REGISTER TEAMS */}
      <div style={{...CD,marginBottom:12*sc}}>
        <div style={{fontSize:15*sc,fontWeight:800,marginBottom:12*sc}}>Register Teams</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <input placeholder="Player 1" value={fP1} onChange={e=>sfP1(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTeam(fP1,fP2,fTN,()=>{sfP1("");sfP2("");sfTN("")})} style={I}/>
          <input placeholder="Player 2" value={fP2} onChange={e=>sfP2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTeam(fP1,fP2,fTN,()=>{sfP1("");sfP2("");sfTN("")})} style={I}/>
        </div>
        <input placeholder="Team name (optional)" value={fTN} onChange={e=>sfTN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTeam(fP1,fP2,fTN,()=>{sfP1("");sfP2("");sfTN("")})} style={{...I,marginBottom:8}}/>
        <button onClick={()=>addTeam(fP1,fP2,fTN,()=>{sfP1("");sfP2("");sfTN("")})} style={{...B("a"),width:"100%",padding:10*sc,fontSize:13*sc}}>Add Team ({teams.length})</button>
      </div>
      {dupNames.size>0&&<div style={{background:C.redBg,border:`1px solid ${C.red}`,borderRadius:8,padding:10,marginBottom:12*sc,fontSize:12*sc,color:C.red,fontWeight:600}}>Duplicate names: {[...dupNames].join(", ")}</div>}
      {undoStack.length>0&&<div style={{background:C.blueBg,border:`1px solid ${C.blue}44`,borderRadius:8,padding:`${8*sc}px ${12*sc}px`,marginBottom:12*sc}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:undoStack.length>1?6*sc:0}}>
          <span style={{fontSize:11*sc,color:C.blue,fontWeight:600}}>Recently removed ({undoStack.length})</span>
          <button onClick={()=>setUndoStack([])} style={{...B("s"),fontSize:10*sc,padding:"2px 8px",color:C.dim}}>Clear all</button>
        </div>
        {undoStack.map(entry=><div key={entry.time} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:`${4*sc}px 0`,borderTop:`1px solid ${C.border}22`}}>
          <span style={{fontSize:12*sc,color:C.text}}><span style={{fontWeight:700}}>{entry.team.name}</span> <span style={{color:C.dim,fontSize:10*sc}}>{entry.team.p1} & {entry.team.p2}</span></span>
          <button onClick={()=>undoDelete(entry)} style={{...B("sa"),fontSize:10*sc,padding:"2px 8px"}}>Undo</button>
        </div>)}
      </div>}
      {teams.length>0&&<div style={{...CD,marginBottom:12*sc}}>
        <div style={{fontSize:13*sc,fontWeight:700,marginBottom:8*sc}}>Teams ({teams.length})</div>
        {teams.map((t,i)=><div key={t.id} style={{padding:`${6*sc}px ${8*sc}px`,borderRadius:7,background:C.input,marginBottom:3,border:`1px solid ${dupNames.has(t.name.toLowerCase())?C.red:C.border}`}}>
          {eTid===t.id?<div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <input value={eNm} onChange={e=>sENm(e.target.value)} placeholder="Team" style={{...I,flex:"1 1 90px",padding:"4px 8px",fontSize:12*sc}}/>
            <input value={eP1} onChange={e=>sEP1(e.target.value)} placeholder="P1" style={{...I,flex:"1 1 70px",padding:"4px 8px",fontSize:12*sc}}/>
            <input value={eP2} onChange={e=>sEP2(e.target.value)} placeholder="P2" style={{...I,flex:"1 1 70px",padding:"4px 8px",fontSize:12*sc}}/>
            <button onClick={saveEdit} style={B("sa")}>Save</button><button onClick={()=>sETid(null)} style={B("s")}>X</button>
          </div>:<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontWeight:700,fontSize:13*sc}}>{i+1}. {t.name}</span><span style={{color:C.dim,fontSize:11*sc,marginLeft:6}}>{t.p1} & {t.p2}</span></div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>{sETid(t.id);sENm(t.name);sEP1(t.p1);sEP2(t.p2)}} style={B("s")}>Edit</button>
              <button onClick={()=>deleteTeam(t.id)} style={{...B("s"),color:C.red}}>{"\u2715"}</button>
            </div>
          </div>}
        </div>)}
      </div>}
      {teams.length>=2&&<button onClick={()=>startTourn()} style={{...B("a"),width:"100%",padding:14*sc,fontSize:15*sc,fontWeight:800,textTransform:"uppercase",background:"linear-gradient(135deg,#00D4AA,#00B892)"}}>
        Start ({teams.length} teams{np2(teams.length)-teams.length>0?`, ${np2(teams.length)-teams.length} byes`:""})</button>}
    </div>}

    {/* BRACKET */}
    {!spectator&&phase!=="reg"&&bracket&&(()=>{const{matches,R,lbR:lR}=bracket;
      const wR=[];for(let r=1;r<=R;r++)wR.push(matches.filter(m=>m.bracket==="W"&&m.round===r));
      const lRs=[];for(let r=1;r<=lR;r++)lRs.push(matches.filter(m=>m.bracket==="L"&&m.round===r));
      const gf=matches.find(m=>m.bracket==="GF"),gfr=matches.find(m=>m.bracket==="GFR");
      return <div style={{padding:16*sc,overflowX:"auto"}}>
        {testMode&&<div style={{display:"flex",gap:6,marginBottom:14*sc,alignItems:"center",flexWrap:"wrap",padding:`8px ${12*sc}px`,background:C.purpleBg,borderRadius:8,border:`1px solid ${C.purple}44`}}>
          <span style={{fontSize:10*sc,fontWeight:800,color:C.purple,textTransform:"uppercase",letterSpacing:"0.08em",padding:`3px ${8*sc}px`,background:C.card,borderRadius:4,border:`1px solid ${C.purple}44`}}>Test Mode</span>
          <button onClick={simRound} style={{...B("c"),borderColor:C.purple+"66",color:C.purple,fontWeight:700}}>Simulate Next Round</button>
          <button onClick={simUndo} disabled={!simUndoStack.length} style={{...B("c"),borderColor:simUndoStack.length?C.purple+"66":C.border,color:simUndoStack.length?C.purple:C.dim,fontWeight:700,opacity:simUndoStack.length?1:0.5,cursor:simUndoStack.length?"pointer":"default"}}>Undo Sim{simUndoStack.length>0?` (${simUndoStack.length})`:""}</button>
          <div style={{flex:1}}/>
          <button onClick={()=>{setTestMode(false);setSimUndoStack([]);flash("Test mode off","success")}} style={{...B("s"),fontSize:10*sc,color:C.dim}}>Exit Test</button>
        </div>}
        {podium&&<div style={{textAlign:"center",padding:`${24*sc}px`,marginBottom:20*sc,background:`linear-gradient(135deg,${C.purpleBg},${C.WBg})`,borderRadius:14,border:`2px solid ${C.purple}`,boxShadow:`0 4px 30px ${C.purpleBg}`,...(showCeleb?{animation:"popIn 0.6s cubic-bezier(0.34,1.56,0.64,1)"}:{})}}>
          <div style={{fontSize:11*sc,color:C.purple,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:16}}>{"\ud83c\udfc6"} Tournament Results {"\ud83c\udfc6"}</div>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:12*sc,marginBottom:8}}>
            {/* 2nd place */}
            <div style={{textAlign:"center",flex:"0 0 auto",minWidth:80*sc}}>
              <div style={{fontSize:28*sc,marginBottom:4}}>🥈</div>
              <div style={{fontSize:10*sc,fontWeight:800,color:C.dim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>2nd Place</div>
              <div style={{fontSize:16*sc,fontWeight:800,color:C.text}}>{podium.second||"TBD"}</div>
              <div style={{height:60*sc,background:`linear-gradient(to top, ${C.border}, ${C.card})`,borderRadius:"6px 6px 0 0",marginTop:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:24*sc,fontWeight:900,color:C.dim}}>2</span></div>
            </div>
            {/* 1st place */}
            <div style={{textAlign:"center",flex:"0 0 auto",minWidth:100*sc}}>
              <div style={{fontSize:36*sc,marginBottom:4}}>🥇</div>
              <div style={{fontSize:10*sc,fontWeight:800,color:C.purple,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Champion</div>
              <div style={{fontSize:22*sc,fontWeight:900,color:C.text}}>{podium.first}</div>
              <div style={{height:90*sc,background:`linear-gradient(to top, ${C.purple}44, ${C.purpleBg})`,borderRadius:"6px 6px 0 0",marginTop:8,border:`1px solid ${C.purple}44`,borderBottom:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:30*sc,fontWeight:900,color:C.purple}}>1</span></div>
            </div>
            {/* 3rd place */}
            <div style={{textAlign:"center",flex:"0 0 auto",minWidth:80*sc}}>
              <div style={{fontSize:28*sc,marginBottom:4}}>🥉</div>
              <div style={{fontSize:10*sc,fontWeight:800,color:C.dim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>3rd Place</div>
              <div style={{fontSize:16*sc,fontWeight:800,color:C.text}}>{podium.third||"TBD"}</div>
              <div style={{height:44*sc,background:`linear-gradient(to top, ${C.border}, ${C.card})`,borderRadius:"6px 6px 0 0",marginTop:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:24*sc,fontWeight:900,color:C.dim}}>3</span></div>
            </div>
          </div>
          <button onClick={()=>{exportBracketImage()}} style={{marginTop:16,padding:`${10*sc}px ${24*sc}px`,borderRadius:8,border:`1px solid ${C.purple}66`,background:C.card,color:C.purple,fontWeight:700,fontSize:13*sc,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}>
            {"\ud83d\uddbc\ufe0f"} Download Full Bracket Image</button>
        </div>}
        {progress&&phase!=="done"&&<div style={{marginBottom:14*sc}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
            <span style={{fontSize:10*sc,fontWeight:700,color:C.dim,textTransform:"uppercase"}}>Tournament Progress</span>
            <span style={{fontSize:11*sc,fontWeight:800,color:C.accent}}>{progress.pct}% ({progress.done}/{progress.total} matches)</span>
          </div>
          <div style={{height:6*sc,background:C.border,borderRadius:3*sc,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progress.pct}%`,background:`linear-gradient(90deg,${C.accent},${C.W})`,borderRadius:3*sc,transition:"width 0.5s ease"}}/>
          </div>
        </div>}
        <div style={{display:"flex",gap:6,marginBottom:16*sc,flexWrap:"wrap",alignItems:"center"}}>
          {activeN>0&&<span style={{display:"flex",alignItems:"center",gap:5,fontSize:12*sc,fontWeight:700,color:C.blue,padding:`4px ${10*sc}px`,background:C.blueBg,borderRadius:6}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:C.blue,animation:"pulse 1.5s infinite"}}/>{activeN} live</span>}
          {readyN>0&&<><span style={{fontSize:12*sc,color:C.dim}}>{readyN} queued</span><button onClick={()=>{if(doAA(bracket))setBracket({...bracket})}} style={B("sa")}>Auto-Assign</button></>}
          <div style={{flex:1}}/>
          <button onClick={()=>setModal({type:"standings"})} style={B("s")}>Standings</button>
          <button onClick={()=>{setModal({type:"teams"});sETid(null)}} style={B("s")}>Teams</button>
          <button onClick={()=>{setModal({type:"addQuick"})}} style={{...B("sa"),borderColor:C.W+"66",color:C.W}}>+ Add Team</button>
          <button onClick={()=>{if(!offlineMode){ask("Go Offline?","Pauses live broadcasting. Spectators will see stale data until you go back online.",()=>setOfflineMode(true))}else setOfflineMode(false)}}
            style={{...B(offlineMode?"sr":"s"),display:"flex",alignItems:"center",gap:4}}>
            {offlineMode?<><span style={{width:6,height:6,borderRadius:"50%",background:C.L}}/>Online</>:<><span style={{width:6,height:6,borderRadius:"50%",background:C.W}}/>Live</>}
          </button>
        </div>
        {renderSection("Winners' Bracket",C.W,wR)}
        {lRs.length>0&&renderSection("Losers' Bracket",C.L,lRs)}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8*sc}}><div style={{width:4,height:16*sc,borderRadius:2,background:C.purple}}/>
          <span style={{fontSize:13*sc,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",color:C.purple}}>Grand Final</span></div>
        <div style={{display:"flex",gap:16*sc,flexWrap:"wrap"}}>{gf&&renderMatch(gf,true)}{gfr&&(gfr.status!=="pending"||gf?.status==="done")&&renderMatch(gfr,true)}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginTop:32*sc}}>
          <button onClick={exportBracketImage} style={{padding:`${8*sc}px ${18*sc}px`,borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.dim,fontWeight:600,fontSize:11*sc,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,opacity:0.7}}>
            {"\ud83d\uddbc\ufe0f"} Download Bracket Image</button>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:12*sc,opacity:0.2}}>
          <span style={{fontSize:9*sc,fontWeight:700,color:C.brand,letterSpacing:"0.1em",textTransform:"uppercase"}}>Cranberry CUP {"\u2022"} Community Uniting People</span></div>
      </div>})()}

    {/* QUICK ADD TEAM */}
    {!spectator&&modal?.type==="addQuick"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
      <div style={{...CD,maxWidth:380,width:"92%",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:16*sc,fontWeight:800}}>Add Team Mid-Tournament</div>
          <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
        <div style={{fontSize:11*sc,color:C.L,marginBottom:12,lineHeight:1.5,padding:`${6*sc}px ${8*sc}px`,background:C.LBg,borderRadius:6,border:`1px solid ${C.L}44`}}>
          Adding a team rebuilds the bracket. Completed matches are lost. A milestone backup is created first.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <input placeholder="Player 1" value={aP1} onChange={e=>sAP1(e.target.value)} style={I}
            onKeyDown={e=>{if(e.key==="Enter")document.getElementById("qa-p2")?.focus()}}/>
          <input id="qa-p2" placeholder="Player 2" value={aP2} onChange={e=>sAP2(e.target.value)} style={I}
            onKeyDown={e=>{if(e.key==="Enter")document.getElementById("qa-tn")?.focus()}}/>
        </div>
        <input id="qa-tn" placeholder="Team name (optional)" value={aTN} onChange={e=>sATN(e.target.value)} style={{...I,marginBottom:12}}
          onKeyDown={e=>{if(e.key==="Enter"){const p1=aP1.trim(),p2=aP2.trim();if(p1&&p2){const nm=aTN.trim()||`${p1} & ${p2}`;const nt=[...teams,{id:uid(),name:nm,p1,p2}];
            ask("Rebuild bracket?",`Adding "${nm}". Results reset, backup created.`,()=>{rebracket(nt);sAP1("");sAP2("");sATN("");setModal(null)})}}}}/>
        <button onClick={()=>{const p1=aP1.trim(),p2=aP2.trim();if(!p1||!p2){flash("Need both players","error");return}
          const nm=aTN.trim()||`${p1} & ${p2}`;const nt=[...teams,{id:uid(),name:nm,p1,p2}];
          ask("Rebuild bracket?",`Adding "${nm}". Results reset, backup created.`,()=>{rebracket(nt);sAP1("");sAP2("");sATN("");setModal(null)})}}
          style={{...B("a"),width:"100%",padding:12*sc,fontSize:14*sc}}>Add & Rebuild Bracket</button>
      </div>
    </div>}

    {/* BOARD PICKER */}
    {!spectator&&modal?.type==="board"&&(()=>{const m=bracket?.matches?.find(x=>x.id===modal.matchId);if(!m)return null;
      const usedBoards=new Set(bracket.matches.filter(x=>x.status==="active"&&x.board).map(x=>x.board));
      const autoNext=(()=>{for(let i=1;i<=boards;i++)if(!usedBoards.has(i))return i;return null})();
      return <div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:360,width:"92%",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div><div style={{fontSize:10*sc,color:C.dim,textTransform:"uppercase"}}>{m.bracket==="GF"?"Grand Final":`${m.bracket==="W"?"Winners'":"Losers'"} R${m.round}`}</div>
            <div style={{fontSize:15*sc,fontWeight:800,marginTop:2}}>Assign Set</div></div>
          <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
        <div style={{fontSize:12*sc,color:C.text,marginBottom:12}}>{tName(m.t1)} vs {tName(m.t2)}</div>
        {autoNext&&<button onClick={()=>assignBd(m.id,autoNext)}
          style={{...B("a"),width:"100%",justifyContent:"center",padding:12*sc,fontSize:14*sc,marginBottom:12}}>
          Auto: Lane {autoNext}</button>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(64px,1fr))",gap:6}}>
          {Array.from({length:boards},(_,i)=>i+1).map(bd=>{const busyMatch=bracket.matches.find(x=>x.id!==m.id&&x.status==="active"&&x.board===bd);const busyLabel=busyMatch?`${tName(busyMatch.t1)} vs ${tName(busyMatch.t2)}`:null;
            return <button key={bd} onClick={()=>{if(busyMatch){ask(`Lane ${bd} in use`,`${busyLabel} will be sent back to queue.`,()=>assignBd(m.id,bd))}else assignBd(m.id,bd)}}
              style={{padding:`${10*sc}px 4px`,borderRadius:8,border:`2px solid ${busyMatch?C.border:C.accent}`,
                background:busyMatch?C.input:C.accentSoft,cursor:"pointer",textAlign:"center",transition:"all 0.12s"}}>
              <div style={{fontSize:18*sc,fontWeight:900,color:busyMatch?C.dim:C.accent}}>{bd}</div>
              <div style={{fontSize:7*sc,color:busyMatch?C.red:C.W,fontWeight:700,textTransform:"uppercase",marginTop:2}}>{busyMatch?"In use":"Open"}</div>
            </button>})}
        </div>
        {!autoNext&&<div style={{fontSize:11*sc,color:C.L,textAlign:"center",marginTop:10}}>All lanes in use. Pick one to reassign.</div>}
      </div></div>})()}

    {/* SCORE MODAL */}
    {!spectator&&modal?.type==="score"&&(()=>{const m=bracket?.matches?.find(x=>x.id===modal.matchId);if(!m)return null;const dn=m.status==="done";
      const s2Ref={current:null};
      const doSubmit=()=>{dn?editScore(m.id,fS1,fS2):completeMatch(m.id,fS1,fS2)};
      return <div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:400,width:"92%",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div><div style={{fontSize:10*sc,color:C.dim,textTransform:"uppercase"}}>{m.bracket==="GF"?"Grand Final":m.bracket==="GFR"?"GF Reset":`${m.bracket==="W"?"Winners'":"Losers'"} R${m.round}`}{m.board?` \u2022 Lane ${m.board}`:""}</div>
            <div style={{fontSize:17*sc,fontWeight:800,marginTop:2}}>{dn?"Edit Score":"Final Score"}</div></div>
          <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center",marginBottom:16}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12*sc,fontWeight:700,color:C.W,marginBottom:8,textTransform:"uppercase"}}>{tName(m.t1)}</div>
            <input value={fS1} onChange={e=>sfS1(e.target.value.replace(/\D/g,""))} placeholder="0" autoFocus
              inputMode="numeric" pattern="[0-9]*"
              style={{...I,textAlign:"center",fontSize:40*sc,fontWeight:900,padding:`${14*sc}px 8px`,fontVariantNumeric:"tabular-nums"}}
              onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();if(s2Ref.current)s2Ref.current.focus()}}}/>
          </div>
          <div style={{fontSize:24*sc,color:C.dimmer,fontWeight:800,paddingTop:28}}>{"\u2014"}</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12*sc,fontWeight:700,color:C.L,marginBottom:8,textTransform:"uppercase"}}>{tName(m.t2)}</div>
            <input ref={el=>{s2Ref.current=el}} value={fS2} onChange={e=>sfS2(e.target.value.replace(/\D/g,""))} placeholder="0"
              inputMode="numeric" pattern="[0-9]*"
              style={{...I,textAlign:"center",fontSize:40*sc,fontWeight:900,padding:`${14*sc}px 8px`,fontVariantNumeric:"tabular-nums"}}
              onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();doSubmit()}}}/>
          </div>
        </div>
        {(()=>{if(!fS1||!fS2)return null;const s1=parseInt(fS1),s2=parseInt(fS2);if(isNaN(s1)||isNaN(s2))return null;
          const v=valScore(s1,s2);if(!v.ok)return <div style={{textAlign:"center",fontSize:11*sc,color:C.red,marginBottom:8}}>{v.msg}</div>;
          return <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:14*sc,fontWeight:700,color:C.accent}}>{s1>s2?tName(m.t1):tName(m.t2)} wins</div>
            {v.warn&&<div style={{fontSize:11*sc,color:C.L,marginTop:4}}>{v.warn}</div>}
          </div>})()}
        {(()=>{const s1=parseInt(fS1),s2=parseInt(fS2);const v=(fS1&&fS2&&!isNaN(s1)&&!isNaN(s2))?valScore(s1,s2):null;const ok=v?.ok;
          return <button onClick={doSubmit} disabled={!ok}
            style={{...B("a"),width:"100%",padding:12*sc,fontSize:14*sc,opacity:ok?1:0.35}}>{dn?"Update Score":"Submit Score"}</button>})()}
        {m.status==="active"&&<button onClick={()=>setModal({type:"board",matchId:m.id})}
          style={{...B("g"),width:"100%",marginTop:8,justifyContent:"center",fontSize:11*sc}}>Change Lane (currently {m.board})</button>}
      </div></div>})()}

    {/* SETTINGS */}
    {modal?.type==="settings"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:480,width:"92%",maxHeight:"85vh",overflowY:"auto",padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:17*sc,fontWeight:800}}>Settings</span>
        <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
      <div style={{fontSize:11*sc,fontWeight:700,color:C.dim,textTransform:"uppercase",marginBottom:6}}>Display</div>
      <div style={{background:C.input,borderRadius:8,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13*sc,fontWeight:600}}>Text Size</span><span style={{fontSize:12*sc,color:C.dim}}>{~~(sc*100)}%</span></div>
        <input type="range" min="60" max="170" value={~~(sc*100)} onChange={e=>setSc(parseInt(e.target.value)/100)} style={{width:"100%",accentColor:C.accent}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10*sc,color:C.dim}}><span>Compact</span><span>TV</span></div></div>
      <div style={{background:C.input,borderRadius:8,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:13*sc,fontWeight:600,marginBottom:8}}>Theme</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["dark","Dark"],["light","Light"],["hc","High Contrast"],["sun","Outdoor/Sun"]].map(([k,l])=>
          <button key={k} onClick={()=>setTheme(k)} style={{...B(theme===k?"sa":"s"),flex:1,justifyContent:"center"}}>{l}</button>)}</div></div>
      <div style={{fontSize:11*sc,fontWeight:700,color:C.dim,textTransform:"uppercase",marginBottom:6,marginTop:12}}>Tournament</div>
      <div style={{background:C.input,borderRadius:8,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:13*sc,fontWeight:600}}>Lanes</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setBoards(p=>Math.max(1,p-1))} style={{...B("g"),width:28,height:28,padding:0,borderRadius:"50%",justifyContent:"center"}}>-</button>
            <span style={{fontSize:18*sc,fontWeight:800,width:28,textAlign:"center"}}>{boards}</span>
            <button onClick={()=>setBoards(p=>Math.min(32,p+1))} style={{...B("g"),width:28,height:28,padding:0,borderRadius:"50%",justifyContent:"center"}}>+</button></div></div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13*sc,fontWeight:600}}>Auto-Assign Lanes</span>
          <button onClick={()=>setAutoB(!autoB)} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",position:"relative",background:autoB?C.accent:C.border,transition:"background 0.2s"}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"#FFF",position:"absolute",top:3,left:autoB?23:3,transition:"left 0.2s"}}/></button></div></div>
      <div style={{fontSize:11*sc,fontWeight:700,color:C.dim,textTransform:"uppercase",marginBottom:6,marginTop:12}}>Data</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={fileSave} style={B("c")}>Download .json</button><button onClick={()=>fileRef.current?.click()} style={B("c")}>Load .json</button></div>
      <div style={{fontSize:11*sc,fontWeight:700,color:C.blue,textTransform:"uppercase",marginBottom:6,marginTop:12}}>Live Spectator</div>
      <div style={{background:C.blueBg,borderRadius:8,padding:12,marginBottom:10,border:`1px solid ${C.blue}44`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div><div style={{fontSize:13*sc,fontWeight:600}}>Broadcast Live</div>
            <div style={{fontSize:10*sc,color:C.dim}}>Guests tap Spectator button to watch</div></div>
          <button onClick={()=>setBroadcasting(!broadcasting)} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",position:"relative",background:broadcasting?C.blue:C.border,transition:"background 0.2s"}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"#FFF",position:"absolute",top:3,left:broadcasting?23:3,transition:"left 0.2s"}}/></button></div>
        {broadcasting&&<div>
          {/* Session status */}
          <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontSize:10*sc,padding:"3px 8px",borderRadius:4,fontWeight:700,
              background:isMaster?C.accentSoft:C.LBg,color:isMaster?C.accent:C.L,border:`1px solid ${isMaster?C.accent:C.L}44`}}>
              {isMaster?"This session is MASTER":"Another session is master"}</span>
            <span style={{fontSize:10*sc,padding:"3px 8px",borderRadius:4,fontWeight:600,
              background:isOnline?C.WBg:C.redBg,color:isOnline?C.W:C.red}}>{isOnline?"Online":"Offline"}</span>
          </div>
          {!isMaster&&masterInfo&&<div style={{fontSize:10*sc,color:C.L,marginBottom:8}}>
            Another admin session is broadcasting. It will auto-handoff if silent for 20s.
            <button onClick={()=>ask("Take over as master?","The other session will be notified it lost master status.",takeOver)} style={{...B("sr"),marginTop:6,width:"100%",justifyContent:"center"}}>Take Over Now</button>
          </div>}
          {/* Offline mode toggle */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,padding:"6px 0",borderTop:`1px solid ${C.border}22`}}>
            <div><div style={{fontSize:12*sc,fontWeight:600}}>Offline Mode</div>
              <div style={{fontSize:9*sc,color:C.dim}}>Pause broadcasting, run locally only</div></div>
            <button onClick={()=>setOfflineMode(!offlineMode)} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",position:"relative",background:offlineMode?C.L:C.border,transition:"background 0.2s"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#FFF",position:"absolute",top:3,left:offlineMode?23:3,transition:"left 0.2s"}}/></button></div>
          {/* QR / URL section */}
          <div style={{borderTop:`1px solid ${C.border}22`,paddingTop:8}}>
            <div style={{fontSize:11*sc,color:C.dim,marginBottom:6}}>Hosted URL for QR code (one-time setup):</div>
            <input value={shareUrl} onChange={e=>setShareUrl(e.target.value.trim())} placeholder="e.g. https://yourname.github.io/cornhole/"
              style={{...I,padding:"6px 10px",fontSize:11*sc,marginBottom:8,fontFamily:"monospace"}}/>
            {(()=>{return shareUrl&&qrSvg?<div style={{display:"flex",justifyContent:"center",padding:12,background:"#FFF",borderRadius:8,marginBottom:8}}>
              <svg width={200} height={200} viewBox={`0 0 ${qrSvg.sz+8} ${qrSvg.sz+8}`} style={{display:"block"}}>
                <rect width={qrSvg.sz+8} height={qrSvg.sz+8} fill="#FFF"/>
                {qrSvg.rects.map(p=><rect key={`${p.r}-${p.c}`} x={p.c+4} y={p.r+4} width={1} height={1} fill="#000"/>)}
              </svg>
            </div>:null})()}
            {shareUrl&&<button onClick={()=>{try{navigator.clipboard.writeText(shareUrl);flash("Copied!","success")}catch{}}}
              style={{...B("c"),width:"100%",justifyContent:"center",marginBottom:6}}>Copy Link</button>}
          </div>
        </div>}
      </div>
      {/* Admin security */}
      <div style={{fontSize:11*sc,fontWeight:700,color:C.red,textTransform:"uppercase",marginBottom:6,marginTop:12}}>Security</div>
      <div style={{background:C.redBg,borderRadius:8,padding:12,marginBottom:10,border:`1px solid ${C.red}44`}}>
        {!showPinChange?<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:13*sc,fontWeight:600}}>Change Admin PIN</div>
            <div style={{fontSize:10*sc,color:C.dim}}>Requires master password</div></div>
          <button onClick={()=>{setShowPinChange(true);setMasterInput("");setNewPinInput("")}} style={B("sr")}>Change PIN</button>
        </div>:<div>
          <div style={{fontSize:12*sc,fontWeight:600,marginBottom:8}}>Enter master password:</div>
          <input value={masterInput} onChange={e=>setMasterInput(e.target.value)} placeholder="Master password" type="password"
            style={{...I,padding:"6px 10px",fontSize:12*sc,marginBottom:8}}/>
          {checkMaster(masterInput)&&<div>
            <div style={{fontSize:12*sc,fontWeight:600,marginBottom:4,color:C.W}}>New PIN (4+ digits):</div>
            <input value={newPinInput} onChange={e=>setNewPinInput(e.target.value.replace(/\D/g,""))} placeholder="New PIN"
              type="password" inputMode="numeric" style={{...I,padding:"6px 10px",fontSize:12*sc,marginBottom:8}}/>
            <button onClick={()=>{if(newPinInput.length<4){flash("Need 4+ digits","error");return}
              changePinHash(_pH(newPinInput));flash("PIN changed!","success");setShowPinChange(false);setMasterInput("");setNewPinInput("")}}
              disabled={newPinInput.length<4}
              style={{...B("a"),width:"100%",justifyContent:"center",marginBottom:6,opacity:newPinInput.length>=4?1:0.4}}>Set New PIN</button>
          </div>}
          <button onClick={()=>{setShowPinChange(false);setMasterInput("");setNewPinInput("")}} style={{...B("g"),width:"100%",justifyContent:"center"}}>Cancel</button>
        </div>}
      </div>
      <div style={{fontSize:11*sc,fontWeight:700,color:C.purple,textTransform:"uppercase",marginBottom:6,marginTop:12}}>Test Mode</div>
      <div style={{background:C.purpleBg,borderRadius:8,padding:12,border:`1px solid ${C.purple}44`}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12*sc}}>Teams:</span>
          <input type="number" min="2" value={testN} onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=2)setTestN(v);else if(e.target.value==="")setTestN(2)}} style={{...I,width:64,padding:"4px 8px",fontSize:12*sc,textAlign:"center"}} />
          <span style={{fontSize:10*sc,color:C.dim}}>(uses lane count from Tournament settings above)</span></div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{if(phase==="play")ask("Tournament in progress!","This will replace all teams.",()=>genTest(false));else genTest(false)}} style={{...B("c"),flex:1,justifyContent:"center",borderColor:C.purple+"66",color:C.purple}}>Generate Only</button>
          <button onClick={()=>{if(phase==="play")ask("Tournament in progress!","This starts a new tournament.",()=>genTest(true));else genTest(true)}} style={{...B("a"),flex:1,justifyContent:"center",background:C.purple}}>Generate & Start</button></div>
      </div>
    </div></div>}

    {/* RULES */}
    {modal?.type==="rules"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:520,width:"92%",maxHeight:"85vh",display:"flex",flexDirection:"column",padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:16*sc,fontWeight:800}}>Official Rules</span>
        <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
      <div style={{flex:1,overflowY:"auto"}}><pre style={{whiteSpace:"pre-wrap",wordWrap:"break-word",fontFamily:"'Segoe UI',system-ui,sans-serif",fontSize:12*sc,lineHeight:1.6,color:C.text}}>{RULES}</pre></div>
    </div></div>}

    {/* STANDINGS */}
    {modal?.type==="standings"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:480,width:"92%",maxHeight:"80vh",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><span style={{fontSize:16*sc,fontWeight:800}}>Standings</span>
        <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
      <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
        {["Team","W","L",""].map(h=><th key={h} style={{padding:`${6*sc}px 10px`,textAlign:h==="Team"?"left":"center",fontSize:10*sc,fontWeight:700,color:C.dim,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
        <tbody>{standings.map(t=><tr key={t.id} style={{borderBottom:`1px solid ${C.border}`,opacity:t.elim?0.4:1}}>
          <td style={{padding:`${6*sc}px 10px`,fontWeight:600,fontSize:13*sc}}>{t.name}</td>
          <td style={{textAlign:"center",fontWeight:700,color:C.W,fontSize:13*sc}}>{t.w}</td>
          <td style={{textAlign:"center",fontWeight:700,color:t.l>0?C.L:C.dim,fontSize:13*sc}}>{t.l}</td>
          <td style={{textAlign:"center"}}><span style={{fontSize:9*sc,fontWeight:700,textTransform:"uppercase",padding:"2px 6px",borderRadius:3,
            color:t.elim?C.red:t.inL?C.L:C.W,background:t.elim?C.redBg:t.inL?C.LBg:C.WBg}}>{t.elim?"OUT":t.inL?"Losers'":"Winners'"}</span></td>
        </tr>)}</tbody></table></div></div>}

    {/* MANAGE TEAMS */}
    {modal?.type==="teams"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget){setModal(null);sETid(null)}}}><div style={{...CD,maxWidth:540,width:"92%",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:16*sc,fontWeight:800}}>Manage Teams</span>
        <button onClick={()=>{setModal(null);sETid(null)}} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
      {phase==="play"&&<div style={{background:C.input,borderRadius:8,padding:12,marginBottom:12,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:12*sc,fontWeight:700,marginBottom:8,color:C.accent}}>Add Late Entry</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
          <input placeholder="Player 1" value={aP1} onChange={e=>sAP1(e.target.value)} style={{...I,padding:"5px 8px",fontSize:12*sc}}/>
          <input placeholder="Player 2" value={aP2} onChange={e=>sAP2(e.target.value)} style={{...I,padding:"5px 8px",fontSize:12*sc}}/></div>
        <input placeholder="Team name (opt)" value={aTN} onChange={e=>sATN(e.target.value)} style={{...I,padding:"5px 8px",fontSize:12*sc,marginBottom:6}}/>
        <button onClick={()=>{const p1=aP1.trim(),p2=aP2.trim();if(!p1||!p2){flash("Need both","error");return}const nm=aTN.trim()||`${p1} & ${p2}`;const nt=[...teams,{id:uid(),name:nm,p1,p2}];
          ask("Rebuild Bracket?","All results lost. Milestone created.",()=>{rebracket(nt);sAP1("");sAP2("");sATN("");setModal(null)})}} style={{...B("a"),width:"100%",padding:8,fontSize:12*sc}}>Add & Rebuild</button></div>}
      <div style={{fontSize:11*sc,color:C.dim,marginBottom:8}}>Renaming updates everywhere instantly.</div>
      <div style={{flex:1,overflowY:"auto"}}>{teams.map((t,i)=><div key={t.id} style={{padding:`${6*sc}px 8px`,borderRadius:7,background:C.input,marginBottom:3,border:`1px solid ${dupNames.has(t.name.toLowerCase())?C.red:C.border}`}}>
        {eTid===t.id?<div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          <input value={eNm} onChange={e=>sENm(e.target.value)} placeholder="Team" style={{...I,flex:"1 1 90px",padding:"4px 8px",fontSize:12*sc}}/>
          <input value={eP1} onChange={e=>sEP1(e.target.value)} placeholder="P1" style={{...I,flex:"1 1 70px",padding:"4px 8px",fontSize:12*sc}}/>
          <input value={eP2} onChange={e=>sEP2(e.target.value)} placeholder="P2" style={{...I,flex:"1 1 70px",padding:"4px 8px",fontSize:12*sc}}/>
          <button onClick={saveEdit} style={B("sa")}>Save</button><button onClick={()=>sETid(null)} style={B("s")}>X</button>
        </div>:<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><span style={{fontWeight:700,fontSize:13*sc}}>{i+1}. {t.name}</span><span style={{color:C.dim,fontSize:11*sc,marginLeft:6}}>{t.p1} & {t.p2}</span></div>
          <button onClick={()=>{sETid(t.id);sENm(t.name);sEP1(t.p1);sEP2(t.p2)}} style={B("s")}>Edit</button></div>}
      </div>)}</div></div></div>}

    {/* BACKUPS */}
    {modal?.type==="backups"&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}><div style={{...CD,maxWidth:560,width:"95%",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:16*sc,fontWeight:800}}>Backups</span>
        <button onClick={()=>setModal(null)} style={{...B("g"),padding:"4px 8px",fontSize:16}}>{"\u2715"}</button></div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={async()=>{await doSnap(ser(),"Manual");flash("Saved!","success");setBackups(await allBk())}} style={B("a")}>Snapshot</button>
        <button onClick={fileSave} style={B("c")}>Download</button><button onClick={()=>fileRef.current?.click()} style={B("c")}>Load File</button></div>
      <div style={{fontSize:11*sc,color:C.dim,marginBottom:10}}>Milestones (purple) per round. Safety backups (gold) survive resets.</div>
      <div style={{flex:1,overflowY:"auto"}}>{backups.length===0?<div style={{textAlign:"center",padding:24,color:C.dim}}>No backups yet</div>:backups.map(bk=>{
        const sf=bk.kind==="safety",ml=bk.kind==="milestone";
        return <div key={bk.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:7,marginBottom:3,
          background:sf?C.LBg:ml?C.purpleBg:C.input,border:`1px solid ${sf?C.L:ml?C.purple:C.border}`}}>
          <div><div style={{display:"flex",alignItems:"center",gap:5}}>
            {sf&&<span style={{fontSize:8*sc,fontWeight:800,color:C.L,textTransform:"uppercase",padding:"1px 5px",background:C.LBg,borderRadius:3,border:`1px solid ${C.L}`}}>Safety</span>}
            {ml&&<span style={{fontSize:8*sc,fontWeight:800,color:C.purple,textTransform:"uppercase",padding:"1px 5px",background:C.purpleBg,borderRadius:3,border:`1px solid ${C.purple}`}}>Milestone</span>}
            <span style={{fontSize:12*sc,fontWeight:(sf||ml)?700:500}}>{bk.snapLabel}</span></div>
            <div style={{fontSize:10*sc,color:C.dim}}>{new Date(bk.snapTime).toLocaleString()}</div></div>
          <button onClick={()=>restoreBk(bk.key)} style={B("s")}>Restore</button></div>})}</div></div></div>}

    {/* CHAT */}
    <div style={{position:"fixed",bottom:12,right:12,zIndex:900,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,maxWidth:"90vw"}}>
      {chatOpen&&<div style={{width:300,maxHeight:420,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,boxShadow:`0 4px 24px ${C.shadow}`,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Chat header */}
        <div style={{padding:"8px 12px",background:C.bg2,borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,fontWeight:700,color:C.text}}>Live Chat</span>
            {chatMsgs.length>0&&<span style={{fontSize:9,color:C.dim}}>({chatMsgs.length})</span>}
            {chatMuted&&<span style={{fontSize:8,fontWeight:700,color:C.red,background:C.redBg,padding:"1px 4px",borderRadius:3}}>MUTED</span>}
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {!spectator&&<>
              <button onClick={toggleMute} title={chatMuted?"Unmute":"Mute"} style={{background:"none",border:"none",color:chatMuted?C.red:C.dim,cursor:"pointer",fontSize:12}}>{chatMuted?"\ud83d\udd07":"\ud83d\udd0a"}</button>
              <button onClick={()=>ask("Clear chat?","Removes all messages for everyone.",clearChat)} title="Clear" style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:12}}>{"\ud83d\uddd1"}</button>
            </>}
            {chatJoined&&<button onClick={()=>setChatJoined(false)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:9,textDecoration:"underline"}}>{chatName}</button>}
            <button onClick={()=>{setChatOpen(false);setChatUnread(0)}} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:14,fontWeight:700}}>{"\u2715"}</button>
          </div>
        </div>
        {/* Name entry or messages */}
        {!chatJoined?<div style={{padding:12}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:8}}>{chatName?"Change your name:":"Enter your name to chat:"}</div>
          <input value={chatName} onChange={e=>setChatName(e.target.value)} placeholder="Your name" maxLength={20}
            onKeyDown={e=>{if(e.key==="Enter"&&chatName.trim()){setChatJoined(true);flash("You're in!","success")}}}
            style={{...I,padding:"6px 8px",fontSize:12,marginBottom:6}}/>
          <button onClick={()=>{if(chatName.trim()){setChatJoined(true);flash("You're in!","success")}}} disabled={!chatName.trim()}
            style={{...B("a"),width:"100%",justifyContent:"center",fontSize:11,padding:"6px",opacity:chatName.trim()?1:0.4}}>Join Chat</button>
        </div>:<>
          {/* Messages */}
          <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:8,minHeight:140,maxHeight:260}}>
            {chatMsgs.length===0&&<div style={{textAlign:"center",padding:16,color:C.dim,fontSize:11}}>No messages yet. Say hi!</div>}
            {chatMsgs.map(m=><div key={m.id} style={{marginBottom:8,padding:`4px 6px`,borderRadius:6,background:m.isSystem?C.blueBg:m.isAdmin?`${C.accent}08`:"transparent",
              borderLeft:m.isAdmin?`2px solid ${C.accent}`:m.isSystem?`2px solid ${C.blue}`:"2px solid transparent"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:10,fontWeight:700,color:m.isSystem?C.blue:m.isAdmin?C.accent:C.W}}>{m.name}</span>
                {m.isAdmin&&!m.isSystem&&<span style={{fontSize:7,fontWeight:800,color:C.accent,background:C.accentSoft,padding:"1px 4px",borderRadius:3,textTransform:"uppercase"}}>admin</span>}
                <span style={{fontSize:9,color:C.dim}}>{new Date(m.time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
              </div>
              <div style={{fontSize:12,color:m.isSystem?C.blue:C.text,lineHeight:1.3,wordBreak:"break-word",fontStyle:m.isSystem?"italic":"normal"}}>{m.text}</div>
            </div>)}
          </div>
          {/* Input */}
          <div style={{padding:8,borderTop:`1px solid ${C.border}`,display:"flex",gap:6}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder={chatMuted&&spectator?"Chat is muted...":"Message..."}
              disabled={chatMuted&&spectator}
              maxLength={200} onKeyDown={e=>{if(e.key==="Enter")sendChat()}}
              style={{...I,padding:"6px 8px",fontSize:12,flex:1,opacity:chatMuted&&spectator?0.4:1}}/>
            <button onClick={sendChat} disabled={!chatInput.trim()||(chatMuted&&spectator)} style={{...B("a"),padding:"6px 10px",fontSize:11,opacity:chatInput.trim()&&!(chatMuted&&spectator)?1:0.4}}>Send</button>
          </div>
        </>}
      </div>}
      {/* Chat toggle bubble */}
      <button onClick={()=>{setChatOpen(!chatOpen);if(!chatOpen){setChatUnread(0);if(!spectator&&!chatJoined){setChatName("Admin");setChatJoined(true)}}setTimeout(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight},100)}}
        style={{width:48,height:48,borderRadius:"50%",background:C.accent,color:C.accentTxt,border:"none",cursor:"pointer",fontSize:20,fontWeight:700,
          boxShadow:`0 2px 12px ${C.shadow}`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        {"\ud83d\udcac"}
        {chatUnread>0&&!chatOpen&&<span style={{position:"absolute",top:-2,right:-2,background:C.red,color:"#FFF",fontSize:10,fontWeight:800,
          minWidth:18,height:18,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{chatUnread}</span>}
      </button>
    </div>

    {/* QR ZOOM */}
    {qrZoom&&qrSvg&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1500,cursor:"pointer"}}
      onClick={()=>setQrZoom(false)}>
      <div style={{textAlign:"center"}}>
        <div style={{background:"#FFF",borderRadius:12,padding:16,display:"inline-block"}}>
          <svg width={Math.min(320,typeof window!=="undefined"?window.innerWidth-60:280)} height={Math.min(320,typeof window!=="undefined"?window.innerWidth-60:280)} viewBox={`0 0 ${qrSvg.sz+8} ${qrSvg.sz+8}`} style={{display:"block"}}>
            <rect width={qrSvg.sz+8} height={qrSvg.sz+8} fill="#FFF"/>
            {qrSvg.rects.map(p=><rect key={`${p.r}-${p.c}`} x={p.c+4} y={p.r+4} width={1} height={1} fill="#000"/>)}
          </svg>
        </div>
        <div style={{marginTop:16,color:"#FFF",fontSize:14,fontWeight:700}}>sjtoth1.github.io/cornhole/</div>
        <div style={{marginTop:8,color:"#888",fontSize:12}}>Tap anywhere to close</div>
      </div>
    </div>}

    {/* TEAM INFO POPUP */}
    {teamInfo&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1200}}
      onClick={()=>setTeamInfo(null)}>
      <div onClick={e=>e.stopPropagation()} style={{...CD,maxWidth:320,width:"90%",padding:20,textAlign:"center"}}>
        <div style={{fontSize:18*sc,fontWeight:900,marginBottom:8,color:C.text}}>{teamInfo.name}</div>
        <div style={{height:2,background:`linear-gradient(90deg,${C.accent},${C.purple})`,borderRadius:1,marginBottom:12}}/>
        <div style={{display:"flex",justifyContent:"center",gap:24,marginBottom:12}}>
          <div><div style={{fontSize:9*sc,color:C.dim,textTransform:"uppercase",marginBottom:4}}>Player 1</div><div style={{fontSize:14*sc,fontWeight:700}}>{teamInfo.p1}</div></div>
          <div><div style={{fontSize:9*sc,color:C.dim,textTransform:"uppercase",marginBottom:4}}>Player 2</div><div style={{fontSize:14*sc,fontWeight:700}}>{teamInfo.p2}</div></div>
        </div>
        {bracket&&(()=>{const ms=bracket.matches.filter(m=>m.t1===teamInfo.id||m.t2===teamInfo.id);
          const w=ms.filter(m=>m.status==="done"&&m.winnerId===teamInfo.id).length;
          const l=ms.filter(m=>m.status==="done"&&m.loserId===teamInfo.id).length;
          const active=ms.find(m=>m.status==="active");
          return <div>
            <div style={{display:"flex",justifyContent:"center",gap:20,marginBottom:10}}>
              <div><span style={{fontSize:24*sc,fontWeight:900,color:C.W}}>{w}</span><span style={{fontSize:10*sc,color:C.dim,marginLeft:4}}>wins</span></div>
              <div><span style={{fontSize:24*sc,fontWeight:900,color:l>0?C.L:C.dim}}>{l}</span><span style={{fontSize:10*sc,color:C.dim,marginLeft:4}}>{l>=2?"eliminated":"loss"+(l===1?"":"es")}</span></div>
            </div>
            {active&&<div style={{fontSize:11*sc,color:C.blue,fontWeight:600}}>Currently playing on Lane {active.board}</div>}
          </div>})()}
        <button onClick={()=>setTeamInfo(null)} style={{...B("g"),width:"100%",marginTop:12,justifyContent:"center"}}>Close</button>
      </div>
    </div>}

    {/* PIN MODAL */}
    {pinModal&&<div style={OV} onClick={e=>{if(e.target===e.currentTarget){setPinModal(null);setPinInput("")}}}>
      <div style={{...CD,maxWidth:320,width:"90%",padding:24,textAlign:"center"}}>
        <div style={{fontSize:16*sc,fontWeight:800,marginBottom:8}}>Enter Admin PIN</div>
        <div style={{fontSize:12*sc,color:C.dim,marginBottom:16,lineHeight:1.5}}>
          Only the tournament organizer should access admin mode.</div>
        <input value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,"").slice(0,8))} placeholder="PIN"
          type="password" inputMode="numeric" pattern="[0-9]*" autoFocus
          style={{...I,textAlign:"center",fontSize:28*sc,fontWeight:900,padding:`${12*sc}px`,letterSpacing:"0.3em",maxWidth:220,margin:"0 auto 16px"}}
          onKeyDown={e=>{if(e.key==="Enter"&&pinInput.length>=4){
            if(checkPin(pinInput)){setPinModal(null);setPinInput("");if(pinModal.onSuccess)pinModal.onSuccess()}
            else flash("Wrong PIN","error")}}}/>
        <button onClick={()=>{if(pinInput.length<4){flash("Need 4+ digits","error");return}
          if(checkPin(pinInput)){setPinModal(null);setPinInput("");if(pinModal.onSuccess)pinModal.onSuccess()}
          else flash("Wrong PIN","error")}}
          disabled={pinInput.length<4}
          style={{...B("a"),width:"100%",padding:12*sc,fontSize:14*sc,opacity:pinInput.length>=4?1:0.4}}>Unlock</button>
        <button onClick={()=>{setPinModal(null);setPinInput("")}} style={{...B("g"),width:"100%",marginTop:8,justifyContent:"center"}}>Cancel</button>
      </div>
    </div>}

    {/* CONFETTI */}
    {showCeleb&&<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:1800,overflow:"hidden"}}>
      {celebPcs.map(p=>{const colors=["#FFD700","#FF6B6B","#00D4AA","#A855F7","#3B82F6","#F59E0B","#EC4899","#10B981"];const sizes=[[14,8],[12,12],[16,7],[10,14],[13,8],[9,13],[14,6],[8,14]];
        return <div key={`c${p.id}`} style={{position:"absolute",left:`${p.left}%`,top:`${p.top}%`,width:sizes[p.ci][0],height:sizes[p.ci][1],
          background:colors[p.ci],borderRadius:p.ci===1||p.ci===4?"50%":"2px",animation:`cf${p.ci} ${1.8+p.delay}s ease-out ${p.delay}s forwards`}}/>})}
    </div>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppWrapper));
</script>
</body>
</html>
